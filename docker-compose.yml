version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: selfin-db
    environment:
      POSTGRES_DB: selfin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: selfin-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/selfin
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: selfin-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
