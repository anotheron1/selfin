spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/selfin
spring.datasource.username=admin
spring.datasource.password=admin

# JPA: только проверяет схему — Flyway управляет DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: если схема уже существует (без flyway_schema_history),
# зафиксировать её как версию 2 и применить только более новые миграции
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
